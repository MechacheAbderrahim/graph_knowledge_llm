paths:
  products_csv: "./amazon_products.csv"
  categories_csv: "./amazon_categories.csv"
  ontology_dir: "ontologies"
  global_ontology_path: "ontologies/global_ontology.json"
  kg_dir: "kg"
  global_kg_path: "kg_global.json"

execution:
  offline: true

columns:
  direct: ["asin", "category_id", "price", "stars"]
  llm: ["title"]

preprocessing:
  enabled: true
  keep_raw_columns: true
  normalized_suffix: "_normalized"
  text_columns: ["title"]

models:
  global_ontology:
    name: "Qwen/Qwen2.5-3B-Instruct"
    load_in_4bit: false
  category_ontology:
    name: "Qwen/Qwen2.5-3B-Instruct"
    load_in_4bit: false
  product_kg:
    name: "Qwen/Qwen2.5-3B-Instruct"
    load_in_4bit: false

run:
  categories: [77, 228, 83, 32]
  max_products_per_category: 25
  seed: 42
  allow_fallback_ontology: false

sampling:
  k_sample_global_onto: 3
  k_sample_category_onto: 15

extraction:
  batch_size: 1

ontology:
  max_new_tokens: 3000
  force_regenerate: false

ontology_limits:
  max_classes: 8
  max_object_properties: 20
  max_data_properties: 12
  max_controlled_vocab: 12
  max_vocab_values: 20
  max_rules: 12

generation:
  deterministic: true

test:
  enabled: true

  columns:
    direct: ["asin", "category_id", "price", "stars"]
    llm: ["title"]

  preprocessing:
    enabled: true
    keep_raw_columns: true
    normalized_suffix: "_normalized"
    text_columns: ["title"]

  models:
    global_ontology:
      name: "Qwen/Qwen2.5-0.5B-Instruct"
      load_in_4bit: false
    category_ontology:
      name: "Qwen/Qwen2.5-0.5B-Instruct"
      load_in_4bit: false
    product_kg:
      name: "Qwen/Qwen2.5-0.5B-Instruct"
      load_in_4bit: false

  run:
    categories: [77]
    max_products_per_category: 2
    seed: 42
    allow_fallback_ontology: true

  sampling:
    k_sample_global_onto: 1
    k_sample_category_onto: 3

  extraction:
    batch_size: 1

  ontology:
    max_new_tokens: 1200
    force_regenerate: true

  ontology_limits:
    max_classes: 3
    max_object_properties: 6
    max_data_properties: 3
    max_controlled_vocab: 3
    max_vocab_values: 5
    max_rules: 4
